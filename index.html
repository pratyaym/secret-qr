<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline Text Vault</title>
<meta name="color-scheme" content="light dark">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1f2328;
    --muted: #656d76;
    --border: #d0d7de;
    --panel: #f6f8fa;
    --input-bg: #ffffff;
    --accent: #0969da;
    --accent-hover: #0757b8;
    --success: #1a7f37;
    --danger: #cf222e;
    --focus: #0969da33;
    --shadow: 0 1px 0 rgba(31,35,40,0.04), 0 1px 3px rgba(31,35,40,0.08);
    --radius: 8px;
    --sans: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Noto Sans", "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --muted: #8b949e;
      --border: #30363d;
      --panel: #161b22;
      --input-bg: #0d1117;
      --accent: #2f81f7;
      --accent-hover: #1f6feb;
      --success: #3fb950;
      --danger: #f85149;
      --focus: #2f81f733;
      --shadow: 0 0 0 1px #30363d;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 64px; }
  header { margin-bottom: 20px; }
  .title { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .title h1 { font-size: 22px; margin: 0; font-weight: 600; letter-spacing: -0.01em; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; padding: 4px 8px; border: 1px solid var(--border);
    border-radius: 999px; background: var(--panel); color: var(--muted);
  }
  .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 14px; }
  .card {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  nav.tabs { display: flex; border-bottom: 1px solid var(--border); }
  nav.tabs button {
    flex: 1; appearance: none; border: 0; background: transparent; color: var(--muted);
    padding: 12px 2px; font-weight: 600; cursor: pointer; font-size: 13px; letter-spacing: .02em;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; text-align: center;
  }
  nav.tabs button:hover { color: var(--fg); }
  nav.tabs button.active { color: var(--fg); border-bottom-color: var(--accent); }
  .panel { padding: 18px; margin-top: 12px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
  textarea, input[type="text"], input[type="password"], input[type="number"] {
    width: 100%; font-family: var(--mono); font-size: 14px; padding: 10px 12px;
    background: var(--input-bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: var(--radius); outline: none; transition: border .15s, box-shadow .15s;
  }
  textarea { resize: vertical; min-height: 140px; }
  textarea[readonly] { background: var(--panel); }
  input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus); }
  .row { display: flex; gap: 8px; align-items: center; }
  .row > * { flex: 1; }
  .input-action { position: relative; }
  .input-action button {
    position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
    border: 1px solid var(--border); background: var(--panel); color: var(--muted);
    border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer;
  }
  .input-action button:hover { color: var(--fg); }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  button.primary {
    background: var(--accent); color: white; border: 1px solid var(--accent);
    padding: 9px 14px; border-radius: var(--radius); font-weight: 600; font-size: 14px;
    cursor: pointer; transition: background .15s;
  }
  button.primary:hover { background: var(--accent-hover); }
  button.primary:disabled { opacity: .6; cursor: not-allowed; }
  button.ghost {
    background: var(--panel); color: var(--fg); border: 1px solid var(--border);
    padding: 8px 12px; border-radius: var(--radius); font-size: 13px; cursor: pointer;
  }
  button.ghost:hover { background: var(--bg); }
  details.advanced { margin-top: 12px; border: 1px dashed var(--border); border-radius: var(--radius); padding: 8px 12px; background: var(--panel); }
  details.advanced summary { cursor: pointer; font-size: 13px; color: var(--muted); font-weight: 600; }
  .output { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
  .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
  @media (min-width: 760px) { .grid { grid-template-columns: 1.3fr .7fr; } }
  .qr-box { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .qr-box .hint { font-size: 12px; color: var(--muted); text-align: center; }
  #qr-wrap { background: white; padding: 8px; border-radius: 6px; }
  .error { margin-top: 10px; padding: 10px 12px; border-radius: var(--radius); background: color-mix(in oklab, var(--danger) 10%, transparent); border: 1px solid color-mix(in oklab, var(--danger) 30%, var(--border)); color: var(--danger); font-size: 13px; }
  .toast {
    position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(20px);
    background: var(--fg); color: var(--bg); padding: 8px 12px; border-radius: 6px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: .2s; z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  footer { margin-top: 28px; text-align: center; color: var(--muted); font-size: 12px; }
  .hidden { display: none !important; }
  /* modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: grid; place-items: center; z-index: 40; }
  .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; width: min(92vw, 420px); box-shadow: 0 20px 40px rgba(0,0,0,.3); }
  .modal video { width: 100%; aspect-ratio: 1; background: black; border-radius: 8px; }
  .modal .bar { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: -2px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">
      <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 0a4 4 0 0 0-4 4v2H3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-1V4a4 4 0 0 0-4-4ZM5 4a3 3 0 1 1 6 0v2H5V4Zm-2 4h10v6H3V8Z"/></svg>
      <h1>Encrypt Secrets</h1>
      <span class="badge" title="All crypto runs locally"><svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5A6.5 6.5 0 1 0 14.5 8 6.508 6.508 0 0 0 8 1.5ZM7 11.5 3.5 8l1.06-1.06L7 9.38l4.44-4.44L12.5 6Z"/></svg>Runs locally</span>
    </div>
    <p class="subtitle">Password-protect text and share via QR</p>
  </header>

  <div class="card">
    <nav class="tabs" role="tablist">
        <button id="tab-enc" class="active" data-tab="encrypt" aria-selected="true">Encrypt</button>
        <button id="tab-dec" data-tab="decrypt" aria-selected="false">Decrypt</button>
      </nav>

    <!-- Encrypt -->
    <section id="pane-encrypt" class="panel" role="tabpanel">
      <label for="plain">Secret</label>
      <textarea id="plain" placeholder="Enter secret to encrypt..." autocomplete="off" spellcheck="true"></textarea>
      <div id="char-counter" style="font-size:11px; color:var(--muted); text-align:right; margin-top:3px">0 chars</div>

      <label for="enc-pass">Password</label>
      <div class="input-action">
        <input id="enc-pass" type="password" placeholder="Password" autocomplete="new-password" autocapitalize="off" spellcheck="false">
        <button type="button" data-toggle="enc-pass" aria-label="Show password">Show</button>
      </div>
      <div id="pass-strength" style="margin-top:6px; display:none">
        <div style="height:4px; background:var(--panel); border-radius:2px; overflow:hidden">
          <div id="strength-bar" style="height:100%; width:0%; transition:width .2s, background .2s"></div>
        </div>
        <div id="strength-text" style="font-size:11px; color:var(--muted); margin-top:4px"></div>
      </div>

      <div class="actions">
        <button id="btn-enc" class="primary">Encrypt</button>
      </div>

      <div id="enc-out" class="output hidden">
        <div class="grid">
          <div>
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px">
              <label for="cipher" style="margin:0">Encrypted payload</label>
              <div style="display:flex; gap:8px; align-items:center">
                <span id="len-info" style="font-size:12px;color:var(--muted)"></span>
                <button id="copy-enc" class="ghost" title="Copy" aria-label="Copy" style="padding:6px">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5A1.5 1.5 0 0 1 6.5 2h5A1.5 1.5 0 0 1 13 3.5v7A1.5 1.5 0 0 1 11.5 12h-5A1.5 1.5 0 0 1 5 10.5v-7ZM6.5 3a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.5-.5h-5Z"/><path d="M3 5.5A1.5 1.5 0 0 1 4.5 4H5v1H4.5a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5H9v1H4.5A1.5 1.5 0 0 1 3 12.5v-7Z"/></svg>
                </button>
              </div>
            </div>
            <textarea id="cipher" readonly rows="6"></textarea>
            <div id="enc-err" class="error hidden"></div>
          </div>
          <div class="qr-box">
            <div style="display:flex; align-items:center; justify-content:space-between; width:100%; max-width:280px; margin-bottom:6px">
              <span style="font-size:12px; font-weight:600; color:var(--muted)">QR Code</span>
              <button id="dl-qr" class="ghost" title="Download PNG" aria-label="Download" style="padding:6px">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a.5.5 0 0 1 .5.5v6.793l2.146-2.147a.5.5 0 0 1 .708.708l-3 3a.5.5 0 0 1-.708 0l-3-3a.5.5 0 1 1 .708-.708L7.5 8.293V1.5A.5.5 0 0 1 8 1z"/><path d="M2 12.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5z"/></svg>
              </button>
            </div>
            <div id="qr-wrap" aria-label="QR code" style="display:flex; align-items:center; justify-content:center; background:#fff; padding:12px; border-radius:8px; border:1px solid var(--border)"></div>
            <div class="hint" id="qr-hint" style="margin-top:6px">Scan to transfer</div>
            <div style="margin-top:8px; display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted)">
              <label for="qr-level" style="margin:0; font-weight:500">Error correction:</label>
              <select id="qr-level" style="font-size:12px; padding:2px 6px; border:1px solid var(--border); border-radius:4px; background:var(--panel); color:var(--fg); cursor:pointer">
                <option value="L">L – 7% (smallest)</option>
                <option value="M" selected>M – 15% (recommended)</option>
                <option value="Q">Q – 25%</option>
                <option value="H">H – 30% (most robust)</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Decrypt -->
    <section id="pane-decrypt" class="panel hidden" role="tabpanel">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px">
        <label for="cipher-in" style="margin:0">Encrypted payload</label>
        <div style="display:flex; gap:6px">
          <button id="btn-scan" class="primary" style="padding:6px 10px; font-size:12px; display:flex; align-items:center; gap:5px; background:#2563eb">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5c0-1.1.9-2 2-2h2"/><path d="M17 3h2c1.1 0 2 .9 2 2v2"/><path d="M21 17v2c0 1.1-.9 2-2 2h-2"/><path d="M7 21H5c-1.1 0-2-.9-2-2v-2"/><rect x="8" y="8" width="8" height="8" rx="1"/></svg>
            Scan
          </button>
          <button id="btn-upload" class="primary" style="padding:6px 10px; font-size:12px; display:flex; align-items:center; gap:5px; background:#2563eb">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload
          </button>
          <input id="file-qr" type="file" accept="image/*" class="hidden">
        </div>
      </div>
      <textarea id="cipher-in" placeholder="Paste encrypted text or use QR" rows="5"></textarea>

      <label for="dec-pass">Password</label>
      <div class="input-action">
        <input id="dec-pass" type="password" placeholder="Password" autocomplete="current-password" autocapitalize="off" spellcheck="false">
        <button type="button" data-toggle="dec-pass" aria-label="Show password">Show</button>
      </div>

      <div class="actions">
        <button id="btn-dec" class="primary">Decrypt</button>
      </div>

      <div id="dec-out" class="output hidden">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px">
          <label for="plain-out" style="margin:0">Decrypted secret</label>
          <button id="copy-dec" class="ghost" title="Copy" aria-label="Copy" style="padding:6px">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M5 3.5A1.5 1.5 0 0 1 6.5 2h5A1.5 1.5 0 0 1 13 3.5v7A1.5 1.5 0 0 1 11.5 12h-5A1.5 1.5 0 0 1 5 10.5v-7ZM6.5 3a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.5-.5h-5Z"/><path d="M3 5.5A1.5 1.5 0 0 1 4.5 4H5v1H4.5a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5H9v1H4.5A1.5 1.5 0 0 1 3 12.5v-7Z"/></svg>
          </button>
        </div>
        <textarea id="plain-out" readonly rows="6"></textarea>
        <div id="dec-err" class="error hidden"></div>
      </div>
    </section>
  </div>

  <footer>PBKDF2-SHA256 (600k) • AES-GCM-256 • Runs locally</footer>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<div id="cam-modal" class="modal-backdrop hidden" aria-hidden="true">
  <div class="modal">
    <video id="cam-video" autoplay playsinline muted></video>
    <canvas id="cam-canvas" class="hidden"></canvas>
    <div class="bar">
      <span style="font-size:13px;color:var(--muted)">Point camera at QR</span>
      <button id="cam-close" class="ghost">Close</button>
    </div>
  </div>
</div>

<!-- Minimal jsQR stub + BarcodeDetector fallback is used in code -->
<script>window.jsQR=function(){return null};</script>

<script>
(async () => {
  'use strict';

  // --- DOM ---
  const $ = s => document.querySelector(s);
  const tabEnc = $('#tab-enc'), tabDec = $('#tab-dec');
  const paneEnc = $('#pane-encrypt'), paneDec = $('#pane-decrypt');
  const plain = $('#plain'), encPass = $('#enc-pass');
  const btnEnc = $('#btn-enc'), encOut = $('#enc-out'), cipher = $('#cipher'), copyEnc = $('#copy-enc'), encErr = $('#enc-err');
  const qrWrap = $('#qr-wrap'), dlQr = $('#dl-qr'), lenInfo = $('#len-info'), qrHint = $('#qr-hint');
  const cipherIn = $('#cipher-in'), decPass = $('#dec-pass');
  const btnDec = $('#btn-dec'), decOut = $('#dec-out'), plainOut = $('#plain-out'), copyDec = $('#copy-dec'), decErr = $('#dec-err');
  const btnUpload = $('#btn-upload'), fileQr = $('#file-qr'), btnScan = $('#btn-scan');
  const toast = $('#toast');
  const camModal = $('#cam-modal'), camVideo = $('#cam-video'), camCanvas = $('#cam-canvas'), camClose = $('#cam-close');

  // Tabs
  function setTab(which) {
    const isEnc = which === 'encrypt';
    tabEnc.classList.toggle('active', isEnc);
    tabDec.classList.toggle('active', !isEnc);
    paneEnc.classList.toggle('hidden', !isEnc);
    paneDec.classList.toggle('hidden', isEnc);
    tabEnc.setAttribute('aria-selected', isEnc);
    tabDec.setAttribute('aria-selected', !isEnc);
  }
  tabEnc.onclick = () => setTab('encrypt');
  tabDec.onclick = () => setTab('decrypt');

  // Show/hide password
  document.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.getAttribute('data-toggle');
      const inp = document.getElementById(id);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    });
  });

  // Password strength
  const passStrength = $('#pass-strength'), strengthBar = $('#strength-bar'), strengthText = $('#strength-text');
  encPass.addEventListener('input', () => {
    const p = encPass.value;
    if (!p) { passStrength.style.display = 'none'; return; }
    passStrength.style.display = 'block';
    let score = 0;
    if (p.length >= 8) score++;
    if (p.length >= 12) score++;
    if (/[a-z]/.test(p) && /[A-Z]/.test(p)) score++;
    if (/\d/.test(p)) score++;
    if (/[^A-Za-z0-9]/.test(p)) score++;
    const levels = [
      {w:'20%', c:'#ef4444', t:'Very weak'},
      {w:'40%', c:'#f97316', t:'Weak'},
      {w:'60%', c:'#eab308', t:'Fair'},
      {w:'80%', c:'#22c55e', t:'Good'},
      {w:'100%', c:'#10b981', t:'Strong'}
    ];
    const level = levels[Math.min(score,4)];
    strengthBar.style.width = level.w;
    strengthBar.style.background = level.c;
    strengthText.textContent = level.t + (score < 3 ? ' — use 12+ chars with mix' : '');
  });

  // Toast
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
  }

  function showErr(el, msg) {
    el.textContent = msg;
    el.classList.remove('hidden');
  }
  function hideErr(el) { el.classList.add('hidden'); }

  // Base64 helpers
  const enc = new TextEncoder(), dec = new TextDecoder();
  function bufToB64(buf) {
    const bytes = new Uint8Array(buf);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }
  function b64ToBuf(b64) {
    const binary = atob(b64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes.buffer;
  }

  // Crypto — AES-256-GCM (authenticated encryption, no separate HMAC needed)
  async function deriveKey(password, salt, iterations) {
    const norm = (password || '').normalize('NFKC');
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(norm), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', hash: 'SHA-256', salt, iterations },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  const ITERATIONS = 600000;

  async function encryptText(plaintext, password) {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv   = crypto.getRandomValues(new Uint8Array(12)); // 96-bit IV for GCM
    const key  = await deriveKey(password, salt, ITERATIONS);
    const ctBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(plaintext));
    return `${bufToB64(salt)}.${bufToB64(iv)}.${bufToB64(new Uint8Array(ctBuf))}`;
  }

  async function decryptText(payload, password) {
    const parts = payload.trim().split('.');
    if (parts.length !== 3) throw new Error('Invalid format');
    const salt       = new Uint8Array(b64ToBuf(parts[0]));
    const iv         = new Uint8Array(b64ToBuf(parts[1]));
    const ciphertext = new Uint8Array(b64ToBuf(parts[2]));
    const key = await deriveKey(password, salt, ITERATIONS);
    const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
    return dec.decode(plainBuf);
  }

  // QR render
  function renderQR(text) {
    qrWrap.innerHTML = '';
    const level = $('#qr-level') ? $('#qr-level').value : 'M';

    const temp = document.createElement('canvas');
    new QRious({
      element: temp,
      value: text,
      size: 512,
      level,
      background: '#ffffff',
      foreground: '#000000',
      padding: 0
    });

    // Step 2: find the tight bounding box of the actual QR data (crop white border QRious may add)
    const tCtx = temp.getContext('2d');
    const imgData = tCtx.getImageData(0, 0, temp.width, temp.height);
    const d = imgData.data;
    let minX = temp.width, minY = temp.height, maxX = 0, maxY = 0;
    for (let y = 0; y < temp.height; y++) {
      for (let x = 0; x < temp.width; x++) {
        const i = (y * temp.width + x) * 4;
        if (d[i] < 128) { // dark pixel
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }

    // Step 3: draw onto final canvas, perfectly centered with equal padding all sides
    const displaySize = 280;
    const qrW = maxX - minX + 1;
    const qrH = maxY - minY + 1;
    const pad = 20;
    const scale = Math.min((displaySize - pad * 2) / qrW, (displaySize - pad * 2) / qrH);
    const drawW = Math.round(qrW * scale);
    const drawH = Math.round(qrH * scale);
    const offX = Math.round((displaySize - drawW) / 2);
    const offY = Math.round((displaySize - drawH) / 2);

    const canvas = document.createElement('canvas');
    canvas.width = displaySize;
    canvas.height = displaySize;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, displaySize, displaySize);
    ctx.drawImage(temp, minX, minY, qrW, qrH, offX, offY, drawW, drawH);
    qrWrap.appendChild(canvas);
  }
  function getQRCanvas() { return qrWrap.querySelector('canvas'); }

  // Encrypt flow
  btnEnc.addEventListener('click', async () => {
    hideErr(encErr);
    const text = plain.value;
    const pass = encPass.value;
    if (!text) return showErr(encErr, 'Enter some text to encrypt.');
    if (!pass) return showErr(encErr, 'Enter a password.');
    btnEnc.disabled = true;
    const old = btnEnc.innerHTML;
    btnEnc.innerHTML = '<span class="spinner"></span>Deriving key…';
    try {
      const payload = await encryptText(text, pass);
      btnEnc.innerHTML = '<span class="spinner"></span>Encrypting…';
      cipher.value = payload;
      encOut.classList.remove('hidden');
      // Show length info
      const len = payload.length;
      const qrMax = 2953; // QR Version 40-L byte mode capacity
      lenInfo.textContent = `${len} chars • QR limit ~${qrMax}`;
      lenInfo.style.color = len > qrMax ? 'var(--danger)' : 'var(--muted)';
      qrHint.textContent = len > qrMax ? 'Too long for QR — use copy/paste' : 'Scan to transfer across devices';
      try {
        renderQR(payload);
      } catch (qrErr) {
        console.error(qrErr);
        showErr(encErr, `QR generation failed (${qrErr.message}). Payload is ${len} chars, limit is ~${qrMax} for QR.`);
        qrWrap.innerHTML = '';
      }
      // scroll into view on mobile
      encOut.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } catch (e) {
      console.error(e);
      showErr(encErr, 'Encryption failed: ' + e.message);
    } finally {
      btnEnc.disabled = false;
      btnEnc.innerHTML = old;
      // wipe secrets from memory/DOM
      encPass.value = '';
      plain.value = '';
      charCounter.textContent = '0 chars';
    }
  });

  copyEnc.addEventListener('click', async () => {
    const text = cipher.value;
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        throw new Error('fallback');
      }
      showToast('Copied!');
    } catch {
      // fallback for file:// or http
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand('copy'); showToast('Copied!'); } catch { showToast('Copy failed — select and copy manually'); }
      document.body.removeChild(ta);
    }
  });

  dlQr.addEventListener('click', () => {
    const canvas = getQRCanvas();
    if (!canvas) return;
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const ts = new Date().toISOString().slice(0,10);
      a.href = url; a.download = `secret-qr-${ts}.png`; a.click();
      URL.revokeObjectURL(url);
    }, 'image/png');
  });

  // Decrypt flow
  btnDec.addEventListener('click', async () => {
    hideErr(decErr);
    const payload = cipherIn.value.trim();
    const pass = decPass.value;
    if (!payload) return showErr(decErr, 'Paste an encrypted payload.');
    if (!pass) return showErr(decErr, 'Enter the password.');
    btnDec.disabled = true;
    const old = btnDec.innerHTML;
    btnDec.innerHTML = '<span class="spinner"></span>Decrypting...';
    try {
      const text = await decryptText(payload, pass);
      plainOut.value = text;
      decOut.classList.remove('hidden');
      startAutoClear();
      cipherIn.value = '';
      decOut.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } catch (e) {
      console.error(e);
      showErr(decErr, 'Invalid password or corrupted data');
    } finally {
      btnDec.disabled = false;
      btnDec.innerHTML = old;
      decPass.value = '';
    }
  });

  copyDec.addEventListener('click', async () => {
    const text = plainOut.value;
    clearAutoClear(); // user has copied — stop countdown
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
      } else {
        throw new Error('fallback');
      }
      showToast('Copied!');
    } catch {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand('copy'); showToast('Copied!'); } catch { showToast('Copy failed — select and copy manually'); }
      document.body.removeChild(ta);
    }
  });

  // QR Upload
  btnUpload.addEventListener('click', () => fileQr.click());
  fileQr.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const bmp = await createImageBitmap(file);
      const text = await decodeFromBitmap(bmp);
      if (text) {
        cipherIn.value = text;
        showToast('QR loaded');
        setTab('decrypt');
      } else {
        showErr(decErr, 'No QR found');
      }
    } catch (err) {
      console.error(err);
      showErr(decErr, 'No QR found');
    } finally {
      fileQr.value = '';
    }
  });

  async function decodeFromBitmap(bitmap) {
    // Try native BarcodeDetector
    if ('BarcodeDetector' in window) {
      try {
        const detector = new BarcodeDetector({ formats: ['qr_code'] });
        const codes = await detector.detect(bitmap);
        if (codes.length) return codes[0].rawValue;
      } catch {}
    }
    // Fallback to jsQR (stub returns null here)
    try {
      const canvas = document.createElement('canvas');
      canvas.width = bitmap.width; canvas.height = bitmap.height;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(bitmap, 0, 0);
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const res = window.jsQR(imgData.data, imgData.width, imgData.height);
      if (res && res.data) return res.data;
    } catch {}
    return null;
  }

  // Camera scan
  let scanRaf = null, stream = null;
  btnScan.addEventListener('click', async () => {
    hideErr(decErr);
    if (!('mediaDevices' in navigator)) return showErr(decErr, 'Camera not supported');
    camModal.classList.remove('hidden');
    camModal.setAttribute('aria-hidden', 'false');
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      camVideo.srcObject = stream;
      await camVideo.play();
      scanLoop();
    } catch (e) {
      console.error(e);
      closeCam();
      showErr(decErr, 'Camera permission denied');
    }
  });

  camClose.addEventListener('click', closeCam);
  function closeCam() {
    camModal.classList.add('hidden');
    camModal.setAttribute('aria-hidden', 'true');
    if (scanRaf) cancelAnimationFrame(scanRaf), scanRaf = null;
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    camVideo.srcObject = null;
  }

  async function scanLoop() {
    if (camVideo.readyState < 2) { scanRaf = requestAnimationFrame(scanLoop); return; }
    const w = camVideo.videoWidth, h = camVideo.videoHeight;
    if (!w || !h) { scanRaf = requestAnimationFrame(scanLoop); return; }
    camCanvas.width = w; camCanvas.height = h;
    const ctx = camCanvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(camVideo, 0, 0, w, h);
    let found = null;
    // Prefer BarcodeDetector
    if ('BarcodeDetector' in window) {
      try {
        const detector = new BarcodeDetector({ formats: ['qr_code'] });
        const codes = await detector.detect(camCanvas);
        if (codes.length) found = codes[0].rawValue;
      } catch {}
    }
    if (!found) {
      try {
        const img = ctx.getImageData(0, 0, w, h);
        const res = window.jsQR(img.data, w, h);
        if (res && res.data) found = res.data;
      } catch {}
    }
    if (found) {
      cipherIn.value = found;
      showToast('QR scanned');
      closeCam();
      setTab('decrypt');
      return;
    }
    scanRaf = requestAnimationFrame(scanLoop);
  }

  // Copy buttons accessibility
  [copyEnc, copyDec].forEach(b => b.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') b.click(); }));

  const charCounter = $('#char-counter');
  const QR_MAX = 2953;
  plain.addEventListener('input', () => {
    const len = plain.value.length;
    charCounter.textContent = `${len} chars${len > 800 ? ` • ~${Math.round(len/QR_MAX*100)}% of QR limit` : ''}`;
    charCounter.style.color = len > QR_MAX ? 'var(--danger)' : 'var(--muted)';
  });

  let countdownInterval = null;
  function startAutoClear() {
    clearAutoClear();
    let secs = 60;
    countdownInterval = setInterval(() => {
      secs--;
      if (secs <= 0) {
        clearAutoClear();
        plainOut.value = '';
        decOut.classList.add('hidden');
        showToast('Decrypted text cleared');
      }
    }, 1000);
  }
  function clearAutoClear() {
    clearInterval(countdownInterval);
  }

  // ESC key closes camera modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !camModal.classList.contains('hidden')) closeCam();
  });

  $('#qr-level').addEventListener('change', () => {
    if (cipher.value) {
      try { renderQR(cipher.value); } catch (e) { /* ignore */ }
    }
  });

  // Prevent accidental navigation with data
  window.addEventListener('beforeunload', (e) => {
    if (plain.value || cipher.value || cipherIn.value || plainOut.value) {
      e.preventDefault(); e.returnValue = '';
    }
  });

})();
</script>
</body>
</html>
