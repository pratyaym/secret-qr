<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<title>Encrypt/Decrypt text, share via QR</title>
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
<style>
:root{
  --bg:#f6f8fb; --bg-elev:#ffffff; --text:#0b1220; --muted:#5b6475; --border:#e2e8f0;
  --primary:#2563eb; --primary-2:#1d4ed8; --ok:#059669; --warn:#d97706; --danger:#dc2626;
  --ring:rgba(37,99,235,.25); --shadow:0 10px 30px rgba(2,6,23,.08); --radius:20px;
}
@media (prefers-color-scheme:dark){
  :root{ --bg:#0b0d12; --bg-elev:#12151c; --text:#e6eaf2; --muted:#9aa3b2; --border:#1f2430;
    --primary:#3b82f6; --primary-2:#2563eb; --ok:#10b981; --warn:#f59e0b; --danger:#ef4444;

}

html,body{height:100%}
body{
  margin:0; background:
    radial-gradient(1200px 800px at 80% -10%, rgba(59,130,246,.12), transparent),
    radial-gradient(900px 600px at -10% 20%, rgba(99,102,241,.10), transparent),
    var(--bg);
  color:var(--text); font:15px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.app{max-width:900px; margin:48px auto; padding:0 20px}
header{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:22px}
h1{font-size:28px; line-height:1.1; margin:0; font-weight:800; letter-spacing:-.02em}
.sub{color:var(--muted); margin:6px 0 0; font-size:14px}
.badge{align-self:center; background:var(--bg-elev); border:1px solid var(--border); padding:6px 12px; border-radius:999px; font-size:12px; font-weight:600; color:var(--muted); box-shadow:var(--shadow); white-space:nowrap}

.card{background:var(--bg-elev); border:1px solid var(--border); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); margin-bottom:16px}

.key-icon svg{width:24px; height:24px}
.status-title{font-weight:700}
.status-sub{font-size:13px; color:var(--muted); margin-top:2px}
.status-sub.ok{color:var(--ok)} .status-sub.warn{color:var(--warn)}

.actions{display:flex; gap:8px}
button{
  appearance:none; border:1px solid transparent; background:var(--primary); color:white; font-weight:600;

}
button:hover{transform:translateY(-1px); filter:brightness(1.05)}
button:active{transform:translateY(0)}
button.ghost{background:transparent; color:var(--text); border-color:var(--border)}
button.ghost:hover{background:rgba(148,163,184,.1)}
button:disabled{opacity:.6; cursor:not-allowed; transform:none}

.tabs{display:flex; gap:6px; border-bottom:1px solid var(--border); margin:-4px -4px 18px; padding:0 4px}
.tab{background:transparent; color:var(--muted); border:none; border-radius:10px 10px 0 0; padding:10px 14px; font-weight:650; position:relative}
.tab.active{color:var(--text)}
.tab.active::after{content:""; position:absolute; left:10px; right:10px; bottom:-1px; height:2px; background:var(--primary); border-radius:2px}

.label{font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px}
textarea{
  width:100%; min-height:150px; resize:vertical; background:var(--bg); border:1px solid var(--border); border-radius:14px;
  padding:12px 14px; color:var(--text); font:14px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; outline:none; transition:.15s
}
textarea:focus{border-color:var(--primary); box-shadow:0 0 0 4px var(--ring)}
.row{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:12px}

.output-box{position:relative; background:var(--bg); border:1px solid var(--border); border-radius:14px; padding:12px 44px 12px 12px; margin-top:8px}

.icon-btn:hover{color:var(--text); background:rgba(148,163,184,.12)}

.qr-wrap{display:flex; gap:20px; align-items:flex-start; margin-top:16px; flex-wrap:wrap}
#qr{background:white; padding:12px; border-radius:16px; border:1px solid var(--border); box-shadow:var(--shadow)}
.muted{color:var(--muted)} .small{font-size:12px}
.ok{color:var(--ok); font-weight:600} .warn{color:var(--warn); font-weight:600}

.clear-info{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top:10px; padding:10px 12px; background:rgba(245,158,11,.08); border:1px dashed rgba(245,158,11,.4); border-radius:12px; font-size:13px; color:var(--warn)}

dialog{border:none; padding:0; background:var(--bg-elev); color:var(--text); border-radius:20px; width:min(520px,92vw); box-shadow:var(--shadow); border:1px solid var(--border)}
dialog::backdrop{background:rgba(0,0,0,.55); backdrop-filter:blur(6px)}
.dialog-head{display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-bottom:1px solid var(--border); font-weight:700}
.dialog-body{padding:12px 16px 16px}
#scanVideo{width:100%; aspect-ratio:3/4; background:#000; border-radius:12px; object-fit:cover}

.toast{
  position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
  background:var(--bg-elev); border:1px solid var(--border); color:var(--text);
  padding:10px 14px; border-radius:12px; box-shadow:var(--shadow); opacity:0; transition:.2s; z-index:99; font-weight:600; font-size:13px; max-width:90vw
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(16,185,129,.5)} .toast.error{border-color:rgba(239,68,68,.5); color:var(--danger)}

@media (max-width:640px){ header{flex-direction:column; align-items:flex-start} .actions{width:100%} .actions button{flex:1} h1{font-size:24px} }

<body>
<div class="app">
  <header>
    <div>
      <h1>Encrypt/Decrypt text, share via QR</h1>
      <p class="sub">Passwordless — use your security key</p>
    </div>
    <span class="badge">Runs locally</span>
  </header>

  <div class="card status">
    <div class="status-left">
      <div class="key-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 7a5 5 0 11-6.9 4.6L3 16.7V21h4.3l5.1-5.1A5 5 0 0015 7z"/>
        </svg>
      </div>
      <div>
        <div class="status-title">Security Key</div>
        <div id="keyStatus" class="status-sub warn">No key registered</div>
      </div>
    <div class="actions">
      <button id="registerBtn">Register key</button>
      <button id="changeBtn" class="ghost">Change key</button>
    </div>
  </div>

  <div class="card">
    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="encrypt" role="tab" aria-selected="true">Encrypt</button>
      <button class="tab" data-tab="decrypt" role="tab" aria-selected="false">Decrypt</button>
    </div>

    <!-- Encrypt -->
    <div id="encryptPane">
      <div class="label">Plaintext</div>
      <textarea id="plain" placeholder="Type anything to encrypt…"></textarea>
      <div class="row">
        <button id="encryptBtn">Encrypt with security key</button>
      </div>

      <div id="encOutWrap" hidden>
        <div class="label" style="margin-top:18px">Encrypted payload</div>
        <div class="output-box">
          <code id="encOutput"></code>
          <button class="icon-btn" data-copy="#encOutput" title="Copy" aria-label="Copy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><rect x="2" y="2" width="13" height="13" rx="2"/></svg>
          </button>
        </div>

        <div id="qrWrap" class="qr-wrap">
          <canvas id="qr" width="240" height="240" aria-label="QR code"></canvas>
          <div>
            <div class="label">Share</div>
            <div id="qrInfo" class="muted small">—</div>
            <div class="row">
              <button id="downloadQr" class="ghost small">Download PNG</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Decrypt -->
    <div id="decryptPane" hidden>
      <div class="label">Encrypted payload</div>
      <textarea id="payloadInput" placeholder="v1.…"></textarea>
      <div class="row">
        <button id="decryptBtn">Decrypt with security key</button>
        <button id="scanBtn" class="ghost">Scan QR</button>
        <button id="uploadBtn" class="ghost">Upload QR</button>
        <input type="file" id="fileInput" accept="image/*" hidden>
      </div>

      <div id="decOutWrap" hidden>
        <div class="label" style="margin-top:18px">Decrypted text</div>
        <div class="output-box">
          <code id="decOutput"></code>
          <button class="icon-btn" data-copy="#decOutput" title="Copy" aria-label="Copy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><rect x="2" y="2" width="13" height="13" rx="2"/></svg>
          </button>
        </div>
        <div class="clear-info">
          <span id="clearCountdown">Auto-clear in 60s</span>
          <button id="clearNowBtn" class="ghost" style="padding:4px 8px; font-size:12px">Clear now</button>
        </div>
      </div>
    </div>
  </div>
</div>

<dialog id="scanDialog">
  <div class="dialog-head">
    Scan QR code
    <button id="closeScan" class="ghost" style="padding:6px 10px">✕</button>
  </div>
  <div class="dialog-body">
    <video id="scanVideo" playsinline></video>
    <p class="muted small" style="margin-top:8px">Point your camera at a QR code</p>
  </div>
</dialog>

<script>
// ---------- helpers ----------
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

const b64uEnc = (buf) => {
  const bytes = new Uint8Array(buf);
  let bin = ''; bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
};
const b64uToBuf = (s) => {
  s = s.replace(/-/g,'+').replace(/_/g,'/');
  const pad = '='.repeat((4 - s.length % 4) % 4);
  const bin = atob(s + pad);
  const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i);
  return out.buffer;
};
const b64uToU8 = (s) => new Uint8Array(b64uToBuf(s));

function toast(msg, type='info'){
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.classList.add('show'), 10);
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(), 200); }, 3200);
}
const showError = e => toast(e?.message || String(e), 'error');

// ---------- webauthn key management ----------
const CRED_KEY = 'webauthnCredId';

function updateKeyStatus(){
  const id = localStorage.getItem(CRED_KEY);
  const el = $('#keyStatus');
  if(id){
    el.textContent = 'Key registered';
    el.className = 'status-sub ok';
    $('#registerBtn').textContent = 'Re-register key';
  }else{
    el.textContent = 'No key registered';
    el.className = 'status-sub warn';
    $('#registerBtn').textContent = 'Register key';
  }
}

async function registerKey(){
  try{
    if(!window.PublicKeyCredential) throw new Error('WebAuthn not supported in this browser');
    const btn = $('#registerBtn'); const orig = btn.textContent;
    btn.disabled = true; btn.textContent = 'Touch your key…';

    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const userId = crypto.getRandomValues(new Uint8Array(16));

    const cred = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: 'Local Vault' },
        user: { id: userId, name: 'local', displayName: 'Local User' },
        pubKeyCredParams: [{type:'public-key', alg:-7},{type:'public-key', alg:-257}],
        authenticatorSelection: { residentKey:'preferred', userVerification:'preferred' },
        extensions: { prf:{enabled:true}, hmacCreateSecret:true },
        timeout: 60000,
        attestation: 'none'
      }
    });

    const id = b64uEnc(cred.rawId);
    localStorage.setItem(CRED_KEY, id);

    // Verify PRF/hmac-secret works
    try{
      await getPrfSecret(true);
      toast('Security key registered', 'success');
    }catch(err){
      localStorage.removeItem(CRED_KEY);
      throw new Error('This key does not support PRF or hmac-secret. Try a different authenticator.');
    }
    updateKeyStatus();
    btn.textContent = orig;
    btn.disabled = false;
  }catch(e){
    $('#registerBtn').disabled = false;
    $('#registerBtn').textContent = 'Register key';
    showError(e);
  }
}

// Get 32-byte secret from authenticator via PRF (fallback to hmac-secret)
async function getPrfSecret(silent=false){
  const credId = localStorage.getItem(CRED_KEY);
  if(!credId) throw new Error('No key registered');
  const challenge = crypto.getRandomValues(new Uint8Array(32));
  const salt = new Uint8Array(32); salt.fill(1); // deterministic per spec

  const assertion = await navigator.credentials.get({
    publicKey: {
      challenge,
      allowCredentials: [{ id: b64uToBuf(credId), type:'public-key' }],
      userVerification: 'preferred',
      timeout: 60000,
      extensions: {
        prf: { eval: { first: salt } },
        hmacGetSecret: { salt1: salt.buffer }
      }
    }
  });

  const ext = assertion.getClientExtensionResults();
  let secret;
  if(ext?.prf?.results?.first){
    secret = ext.prf.results.first; // ArrayBuffer
  }else if(ext?.hmacGetSecret?.output1){
    secret = ext.hmacGetSecret.output1; // ArrayBuffer
  }else{
    throw new Error('PRF not available from authenticator');
  }
  const sec = new Uint8Array(secret);
  if(sec.byteLength !== 32) throw new Error('Invalid PRF secret length');
  return sec; // Uint8Array(32)
}

// ---------- crypto ----------
async function encryptWithKey(plaintext){
  const secret = await getPrfSecret();
  const key = await crypto.subtle.importKey('raw', secret, {name:'AES-GCM'}, false, ['encrypt']);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const data = new TextEncoder().encode(plaintext);
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, data);
  const credId = localStorage.getItem(CRED_KEY);
  const payload = ['v1', credId, b64uEnc(iv), b64uEnc(ct)].join('.');
  return {payload, iv, ct};
}
async function decryptWithKey(payload){
  const parts = payload.split('.');
  if(parts.length!==4 || parts[0]!=='v1') throw new Error('Invalid payload format');
  const [,credId, ivB64, ctB64] = parts;
  const stored = localStorage.getItem(CRED_KEY);
  if(!stored) throw new Error('No key registered on this device');
  if(credId !== stored) throw new Error('This payload was encrypted with a different key');
  const secret = await getPrfSecret();
  const key = await crypto.subtle.importKey('raw', secret, {name:'AES-GCM'}, false, ['decrypt']);
  const iv = b64uToU8(ivB64);
  const ct = b64uToBuf(ctB64);
  const ptBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return new TextDecoder().decode(ptBuf);
}

// ---------- UI actions ----------
async function doEncrypt(){
  const pt = $('#plain').value;
  if(!pt.trim()) return showError('Enter text to encrypt');
  const btn = $('#encryptBtn'); const orig = btn.textContent;
  btn.disabled = true; btn.textContent = 'Touch your key…';
  try{
    const {payload} = await encryptWithKey(pt);
    $('#encOutput').textContent = payload;
    $('#encOutWrap').hidden = false;

    // QR
    if(window.QRious){
      new QRious({element: $('#qr'), value: payload, size: 240, level:'M', background:'white', foreground:'black'});
      $('#qrWrap').hidden = false;
    }else{
      $('#qrWrap').hidden = true;
    }
    const len = payload.length;
    const safe = 1850;
    $('#qrInfo').innerHTML = `${len.toLocaleString()} characters · ${len < safe ? '<span class="ok">QR OK</span>' : '<span class="warn">Large for QR</span>'} · ~${Math.ceil(len/ safe*100)}% of recommended`;
    toast('Encrypted', 'success');
  }catch(e){ showError(e); }
  finally{ btn.disabled=false; btn.textContent=orig; }
}

let clearTimer;
function startClearTimer(){
  clearTimeout(clearTimer);
  let secs = 60;
  const el = $('#clearCountdown');
  const tick = () => {
    el.textContent = `Auto-clear in ${secs}s`;
    if(secs-- <= 0){ clearDecrypted(); } else { clearTimer = setTimeout(tick, 1000); }
  };
  tick();
}
function clearDecrypted(){
  $('#decOutput').textContent = '';
  $('#decOutWrap').hidden = true;
  clearTimeout(clearTimer);
}

async function doDecrypt(){
  const payload = $('#payloadInput').value.trim();
  if(!payload) return showError('Paste payload or scan QR');
  const btn = $('#decryptBtn'); const orig = btn.textContent;
  btn.disabled = true; btn.textContent = 'Touch your key…';
  try{
    const pt = await decryptWithKey(payload);
    $('#decOutput').textContent = pt;
    $('#decOutWrap').hidden = false;
    startClearTimer();
    toast('Decrypted', 'success');
  }catch(e){ showError(e); }
  finally{ btn.disabled=false; btn.textContent=orig; }
}

// ---------- QR scan/upload ----------
async function startScan(){
  if(!('BarcodeDetector' in window)){
    return showError('BarcodeDetector not supported – use Upload instead');
  }
  const dialog = $('#scanDialog');
  const video = $('#scanVideo');
  try{
    dialog.showModal();
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject = stream; await video.play();
    const detector = new BarcodeDetector({formats:['qr_code']});
    let stopped = false;
    const stop = () => { stopped=true; stream.getTracks().forEach(t=>t.stop()); if(dialog.open) dialog.close(); };
    $('#closeScan').onclick = stop;
    dialog.addEventListener('cancel', stop, {once:true});

    const loop = async () => {
      if(stopped) return;
      try{
        const codes = await detector.detect(video);
        if(codes.length){
          const val = codes[0].rawValue || '';
          if(val){
            $('#payloadInput').value = val;
            toast('QR scanned','success');
            stop();
            switchTab('decrypt');
            return;
          }
        }
      }catch{}
      requestAnimationFrame(loop);
    };
    loop();
  }catch(e){ showError(e); if(dialog.open) dialog.close(); }
}

async function handleUpload(file){
  if(!file) return;
  const img = new Image();
  img.onload = async () => {
    try{
      const canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext('2d'); ctx.drawImage(img,0,0);
      if('BarcodeDetector' in window){
        const det = new BarcodeDetector({formats:['qr_code']});
        const codes = await det.detect(canvas);
        if(codes.length){ $('#payloadInput').value = codes[0].rawValue; toast('QR decoded','success'); }
        else showError('No QR code found in image');
      }else{
        showError('BarcodeDetector not supported');
      }
    }catch(e){ showError(e); }
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(file);
}

// ---------- tabs ----------
function switchTab(name){
  $$('.tab').forEach(b=>{
    const active = b.dataset.tab===name;
    b.classList.toggle('active', active);
    b.setAttribute('aria-selected', active?'true':'false');
  });
  $('#encryptPane').hidden = name!=='encrypt';
  $('#decryptPane').hidden = name!=='decrypt';
}

// ---------- init ----------
document.addEventListener('DOMContentLoaded', ()=>{
  updateKeyStatus();
  if(!window.isSecureContext) toast('WebAuthn requires HTTPS or localhost','error');
  if(!window.PublicKeyCredential) toast('WebAuthn not supported','error');

  $$('.tab').forEach(b=> b.addEventListener('click', ()=> switchTab(b.dataset.tab)));
  $('#registerBtn').addEventListener('click', registerKey);
  $('#changeBtn').addEventListener('click', registerKey);
  $('#encryptBtn').addEventListener('click', doEncrypt);
  $('#decryptBtn').addEventListener('click', doDecrypt);
  $('#scanBtn').addEventListener('click', startScan);
  $('#uploadBtn').addEventListener('click', ()=> $('#fileInput').click());
  $('#fileInput').addEventListener('change', e=> handleUpload(e.target.files[0]));
  $('#downloadQr').addEventListener('click', ()=>{
    const a = document.createElement('a');
    a.href = $('#qr').toDataURL('image/png');
    a.download = 'vault-qr.png'; a.click();
  });
  $('#clearNowBtn').addEventListener('click', clearDecrypted);

  document.addEventListener('click', e=>{
    const btn = e.target.closest('[data-copy]');
    if(!btn) return;
    const sel = btn.getAttribute('data-copy');
    const txt = $(sel)?.textContent || '';
    navigator.clipboard.writeText(txt).then(()=> toast('Copied','success')).catch(()=> showError('Copy failed'));
  });
});
</script>
