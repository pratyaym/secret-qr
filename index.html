<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    ============================================================
    Encrypt / Decrypt — Passkey + Password
    Dual-mode: WebAuthn PRF (passkey) or PBKDF2-SHA256 (password)
    Runs fully client-side, single file, offline-capable.
    ============================================================
  -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" href="data:,">

  <title>Encrypt / Decrypt</title>
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>

    /* ── 1. Design tokens ───────────────────────────────────────────────────── */
    :root {
      --bg:          #ffffff;
      --fg:          #1f2328;
      --muted:       #656d76;
      --border:      #d0d7de;
      --panel:       #f6f8fa;
      --input-bg:    #ffffff;
      --accent:      #0969da;
      --accent-hover:#0757b8;
      --success:     #1a7f37;
      --danger:      #cf222e;
      --focus:       #0969da33;
      --shadow:      0 1px 0 rgba(31,35,40,0.04), 0 1px 3px rgba(31,35,40,0.08);
      --radius:      8px;
      --sans: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell,
              "Noto Sans", "Helvetica Neue", Arial, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas,
              "Liberation Mono", monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #0d1117;
        --fg:          #e6edf3;
        --muted:       #8b949e;
        --border:      #30363d;
        --panel:       #161b22;
        --input-bg:    #0d1117;
        --accent:      #2f81f7;
        --accent-hover:#1f6feb;
        --success:     #3fb950;
        --danger:      #f85149;
        --focus:       #2f81f733;
        --shadow:      0 0 0 1px #30363d;
      }
    }

    /* ── 2. Reset & base ─────────────────────────────────────────────────────── */
    *             { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body    { height: 100%; overflow-x: hidden; }
    html { -webkit-touch-callout: none; }
    body {
      margin: 0;
      background:            var(--bg);
      color:                 var(--fg);
      font-family:           var(--sans);
      line-height:           1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── 3. Layout ───────────────────────────────────────────────────────────── */
    .wrap   { max-width: 860px; margin: 0 auto; padding: 20px 14px 64px; width: 100%; box-sizing: border-box; }
    header  { margin-bottom: 20px; }
    .grid   { display: grid; grid-template-columns: 1fr; gap: 16px; }

    /* ── 4. Typography helpers ───────────────────────────────────────────────── */
    .title {
      display:     flex;
      align-items: center;
      gap:         12px;
      flex-wrap:   wrap;
    }
    .title h1 {
      font-size:      22px;
      margin:         0;
      font-weight:    600;
      letter-spacing: -0.01em;
    }
    .subtitle {
      margin: 6px 0 0;
      color:  var(--muted);
      font-size: 14px;
    }
    label {
      display:     block;
      font-size:   13px;
      font-weight: 600;
      margin:      14px 0 6px;
    }
    .char-counter {
      font-size:  11px;
      color:      var(--muted);
      text-align: right;
      margin-top: 3px;
    }
    .len-info    { font-size: 12px; color: var(--muted); }
    .countdown   { font-size: 12px; color: var(--muted); }
    .qr-label    { font-size: 12px; font-weight: 600; color: var(--muted); }
    .qr-hint     { font-size: 12px; color: var(--muted); text-align: center; }
    footer {
      margin-top:  28px;
      text-align:  center;
      color:       var(--muted);
      font-size:   12px;
    }

    /* ── 5a. Badge ───────────────────────────────────────────────────────────── */
    .badge {
      display:     inline-flex;
      align-items: center;
      gap:         6px;
      font-size:   12px;
      padding:     4px 8px;
      border:      1px solid var(--border);
      border-radius: 999px;
      background:  var(--panel);
      color:       var(--muted);
    }

    /* ── 5b. Passkey toggle ────────────────────────────────────────────────────── */
    .passkey-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      cursor: pointer;
      user-select: none;
      padding: 4px 0;
    }
    .switch-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      transition: color .22s;
    }
    .passkey-switch input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .passkey-switch .slider {
      position: relative;
      width: 42px;
      height: 24px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      transition: background .15s, border-color .15s;
    }
    .passkey-switch .slider::before {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform .15s, background .15s;
    }
    .passkey-switch input:checked + .slider {
      background: var(--accent);
      border-color: var(--accent);
    }
    .passkey-switch input:checked + .slider::before {
      transform: translateX(18px);
      background: var(--bg);
    }
    .passkey-switch input:checked ~ .switch-label {
      color: var(--fg);
    }
    .passkey-switch input:focus-visible + .slider {
      /* v6: glow removed */
    }
    .passkey-switch:hover .slider {
      border-color: var(--accent-hover);
    }

    /* ── 5c. Card & tabs ─────────────────────────────────────────────────────── */
    .card {
      background:    var(--bg);
      border:        1px solid var(--border);
      border-radius: var(--radius);
      box-shadow:    var(--shadow);
    }
    nav.tabs {
      display:       flex;
      border-bottom: 1px solid var(--border);
    }
    nav.tabs button {
      flex:          1;
      appearance:    none;
      border:        0;
      background:    transparent;
      color:         var(--muted);
      padding:       12px 2px;
      font-weight:   600;
      cursor:        pointer;
      font-size:     13px;
      letter-spacing:.02em;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition:    color .15s, border-color .15s;
      text-align:    center;
      font-family:   var(--sans);
    }
    nav.tabs button:hover  { color: var(--fg); }
    nav.tabs button.active { color: var(--fg); border-bottom-color: var(--accent); }
    .panel { padding: 18px; margin-top: 12px; }

    /* ── 5d. Form controls ───────────────────────────────────────────────────── */
    textarea,
    input[type="text"],
    input[type="password"],
    input[type="number"] {
      width:        100%;
      font-family:  var(--mono);
      font-size:    16px;
      padding:      10px 12px;
      background:   var(--input-bg);
      color:        var(--fg);
      border:       1px solid var(--border);
      border-radius:var(--radius);
      outline:      none;
      transition:   border .15s, box-shadow .15s;
    }
    textarea { resize: vertical; }
    @media (pointer: coarse) {
      textarea { resize: none; }
    }
    textarea::-webkit-resizer { display: none; }
    textarea            { resize: vertical; min-height: 140px; }
    textarea[readonly]  { background: var(--panel); }
    input:focus,
    textarea:focus {
      border-color: var(--accent);
      /* v6: box-shadow removed */
    }

    /* Show/hide password wrapper */
    .input-action { position: relative; }
    .input-action input { padding-right: 60px; }
    .input-action .toggle-vis {
      position:  absolute;
      right:     6px;
      top:       50%;
      transform: translateY(-50%);
      border:    1px solid var(--border);
      background:var(--panel);
      color:     var(--muted);
      border-radius: 6px;
      padding:   4px 8px;
      font-size: 12px;
      cursor:    pointer;
      font-family: var(--sans);
    }
    .input-action .toggle-vis:hover { color: var(--fg); }

    /* QR error-correction select */
    .qr-level-select {
      font-size:     12px;
      padding:       2px 6px;
      border:        1px solid var(--border);
      border-radius: 4px;
      background:    var(--panel);
      color:         var(--fg);
      cursor:        pointer;
    }

    /* ── 5e. Password strength meter ─────────────────────────────────────────── */
    .pass-strength {
      margin-top: 6px;
    }
    .strength-bar-track {
      height:        4px;
      background:    var(--panel);
      border-radius: 2px;
      overflow:      hidden;
      border:        1px solid var(--border);
    }
    .strength-bar-fill {
      height:     100%;
      width:      0%;
      transition: width .2s, background .2s;
    }
    .strength-text {
      font-size:  11px;
      color:      var(--muted);
      margin-top: 4px;
    }
    .strength-checklist {
      margin-top:  6px;
      display:     flex;
      flex-wrap:   wrap;
      gap:         4px 14px;
      font-size:   11px;
      color:       var(--muted);
      list-style:  none;
      padding:     0;
    }
    .strength-checklist li { white-space: nowrap; }
    .strength-checklist li.pass { color: var(--success); }
    .strength-checklist li.fail { color: var(--muted); }

    /* ── 5f. QR label fields ─────────────────────────────────────────────────── */
    .qr-label-fields {
      width: 100%;
      max-width: 280px;
    }
    .qr-label-fields label {
      font-size:   11px;
      font-weight: 600;
      color:       var(--muted);
      margin:      8px 0 3px;
    }
    .qr-label-fields input[type="text"] {
      font-family: var(--sans);
      font-size:   12px;
      padding:     5px 8px;
    }

    /* ── 5g. Buttons ─────────────────────────────────────────────────────────── */
    button.actions > .primary { width: 100%; flex: none; }
    .primary {
      background:    var(--accent);
      color:         white;
      border:        1px solid var(--accent);
      padding:       9px 14px;
      border-radius: var(--radius);
      font-weight:   600;
      font-size:     14px;
      cursor:        pointer;
      transition:    background .15s;
      font-family:   var(--sans);
    }
    button.primary:hover    { background: var(--accent-hover); }
    button.primary:disabled { opacity: .6; cursor: not-allowed; }

    button.ghost {
      background:    var(--panel);
      color:         var(--fg);
      border:        1px solid var(--border);
      padding:       8px 12px;
      border-radius: var(--radius);
      font-size:     13px;
      cursor:        pointer;
      font-family:   var(--sans);
    }
    button.ghost:hover { background: var(--bg); }

    /* Icon-only ghost variant */
    button.ghost.icon { padding: 6px; }

    /* Inline ghost variant (scan / upload) */
    button.ghost.inline {
      padding:     6px 10px;
      font-size:   12px;
      display:     flex;
      align-items: center;
      gap:         5px;
    }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .actions .primary { flex: 1 1 100%; width: 100%; }

    /* ── 5h. Error message ───────────────────────────────────────────────────── */
    .error {
      margin-top:    10px;
      padding:       10px 12px;
      border-radius: var(--radius);
      background:    color-mix(in oklab, var(--danger) 10%, transparent);
      border:        1px solid color-mix(in oklab, var(--danger) 30%, var(--border));
      color:         var(--danger);
      font-size:     13px;
    }

    /* ── 6. Output panel & QR box ────────────────────────────────────────────── */
    .output {
      margin-top:  18px;
      padding-top: 16px;
      border-top:  1px solid var(--border);
    }
    .output-header {
      display:         flex;
      align-items:     center;
      justify-content: space-between;
      margin-bottom:   6px;
    }
    .output-header label   { margin: 0; }
    .output-header-actions { display: flex; gap: 8px; align-items: center; }

    .decrypt-input-header {
      display:         flex;
      align-items:     center;
      justify-content: space-between;
      margin-bottom:   6px;
    }
    .decrypt-input-header label   { margin: 0; }
    .decrypt-input-actions        { display: flex; gap: 7px; }

    .qr-box {
      background:     var(--panel);
      border:         1px solid var(--border);
      border-radius:  var(--radius);
      padding:        12px;
      display:        flex;
      flex-direction: column;
      align-items:    center;
      gap:            10px;
    }
    .qr-box-header {
      display:         flex;
      align-items:     center;
      justify-content: space-between;
      width:           100%;
      max-width:       280px;
      margin-bottom:   6px;
    }
    #qr-wrap {
      background:    white;
      padding:       8px;
      border-radius: 6px;
      line-height:   0;
    }
    .qr-level-row {
      display:     flex;
      align-items: center;
      gap:         6px;
      font-size:   12px;
      color:       var(--muted);
      margin-top:  8px;
    }
    .qr-level-row label { margin: 0; font-weight: 500; }

    /* ── 7. Toast, modal & spinner ───────────────────────────────────────────── */
    .toast {
      position:       fixed;
      left:           50%;
      bottom:         20px;
      transform:      translateX(-50%) translateY(20px);
      background:     var(--fg);
      color:          var(--bg);
      padding:        8px 12px;
      border-radius:  6px;
      font-size:      13px;
      opacity:        0;
      pointer-events: none;
      transition:     .2s;
      z-index:        50;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .modal-backdrop {
      position:    fixed;
      inset:       0;
      background:  rgba(0,0,0,.6);
      display:     grid;
      place-items: center;
      z-index:     40;
    }
    .modal {
      background:    var(--bg);
      border:        1px solid var(--border);
      border-radius: 12px;
      padding:       12px;
      width:         min(92vw, 420px);
      box-shadow:    0 20px 40px rgba(0,0,0,.3);
    }
    .modal video {
      width:         100%;
      aspect-ratio:  1;
      background:    black;
      border-radius: 8px;
    }
    .modal-bar {
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      margin-top:      8px;
    }
    .modal-bar span { font-size: 13px; color: var(--muted); }

    .spinner {
      display:          inline-block;
      width:            14px;
      height:           14px;
      border:           2px solid currentColor;
      border-right-color: transparent;
      border-radius:    50%;
      animation:        spin .7s linear infinite;
      vertical-align:   -2px;
      margin-right:     6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 8. Utility ──────────────────────────────────────────────────────────── */
    .hidden { display: none !important; }
    /* Smooth password fields for mode toggle */
    #enc-pw-fields, #dec-pw-fields {
      display: grid;
      overflow: visible;
      height: auto;
    }
    #enc-pw-fields.is-collapsed, #dec-pw-fields.is-collapsed { display: none; }
    #enc-pw-fields > .pw-inner, #dec-pw-fields > .pw-inner { overflow: hidden; width: 100%; }
    #enc-pw-fields > .pw-inner, #dec-pw-fields > .pw-inner {
      overflow: hidden;
    }
    /* Smooth button label fade */
    #btn-enc, #btn-dec {
      transition: opacity 260ms ease;
    }

    /* ── 9. Responsive ───────────────────────────────────────────────────────── */
    @media (min-width: 760px) {
      .grid { grid-template-columns: 1.3fr .7fr; }
    }

  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>
<div class="wrap">

  <!-- ── Header ─────────────────────────────────────────────────────────────── -->
  <header>
    <div class="title">
      <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0a4 4 0 0 0-4 4v2H3a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h10a2 2 0 0 0
                 2-2V8a2 2 0 0 0-2-2h-1V4a4 4 0 0 0-4-4ZM5 4a3 3 0 1 1 6 0v2H5V4Zm-2
                 4h10v6H3V8Z"/>
      </svg>
      <h1>Encrypt / Decrypt</h1>
      <label class="passkey-switch" title="Use passkey instead of password">
        <span class="switch-label">
          <svg width="20" height="20" viewBox="0 0 505 511.568" style="color:var(--accent)" fill="currentColor" aria-hidden="true">
            <path d="M255.211 356.15 102.02 507.058c-2.821 2.748-6.67 4.451-10.916 4.451l-74.119-.002c-.452.04-.91.061-1.374.061-8.621 0-15.611-6.99-15.611-15.61v-75.014c0-8.62 6.99-15.61 15.611-15.61h41.151v-46.838c0-8.62 6.99-15.61 15.61-15.61h46.753v-43.47h.023c-.002-6.644 4.278-12.8 10.954-14.879l37.147-11.549a187.9 187.9 0 01-2.909-5.863c-17.637-37.11-22.819-78.45-14.938-118.812 6.813-34.911 24.276-68.296 49.026-93.842 24.351-25.138 56.648-43.598 90.974-50.759 35.45-7.395 73.082-3.755 106.178 11.061 32.293 14.452 59.36 37.434 78.701 67.074C494.653 113.076 505 148.14 505 185.414c0 37.277-10.361 72.359-30.719 103.595-19.107 29.314-45.921 52.19-77.852 66.663l-.79.383a164.41 164.41 0 01-33.922 11.062c-35.675 7.505-73.111 3.619-106.506-10.967zm128.625-194.373c0-8.899-3.395-17.799-10.18-24.583-6.784-6.785-15.683-10.18-24.581-10.18s-17.798 3.395-24.583 10.18c-6.783 6.784-10.18 15.686-10.18 24.583 0 8.898 3.397 17.798 10.18 24.581 6.785 6.786 15.685 10.181 24.583 10.181 8.898 0 17.797-3.395 24.581-10.181 6.785-6.783 10.18-15.683 10.18-24.581z"/>
            <path d="M252.02 337.443c42.44 21.687 93.496 24.149 137.217 4.404 40.331-18.046 70.252-49.649 87.263-90.305 17.239-41.564 17.241-90.692.001-132.255-16.986-40.585-47.001-72.288-87.263-90.306-39.949-17.881-87.661-17.882-127.611 0-40.266 18.022-70.274 49.716-87.263 90.306-22.094 53.28-15.5 114.857 16.251 162.756l-55.88 17.373v59.081H72.372v62.447H15.61v75.014l75.494.001L252.02 337.443zm132.673-211.286c19.671 19.671 19.671 51.568 0 71.239-19.67 19.671-51.568 19.671-71.239 0-19.67-19.671-19.67-51.568 0-71.239 19.671-19.671 51.569-19.671 71.239 0z"/>
            <path d="M252.019 337.444a165.091 165.091 0 0034.986 13.13c12.332 3.122 25.216 4.644 38.67 4.644 22.496 0 43.709-4.404 63.562-13.371 19.858-8.885 37.23-20.977 52.038-36.348 14.892-15.287 26.583-33.302 35.225-53.957 8.57-20.656 12.889-42.671 12.889-66.127.001-23.461-4.321-45.473-12.891-66.128-8.237-19.689-19.243-36.903-33.15-51.784 39.491 180.684-131.178 233.426-232.976 232.976L15.61 495.24v.718l75.494.001 160.915-158.515z"/>
          </svg>
          Passkey
        </span>
        <input type="checkbox" id="modeToggle" role="switch" aria-label="Enable passkey mode">
        <span class="slider"></span>
      </label>
    </div>
    <p class="subtitle">Encrypt secrets and share via QR — fully client-side</p>
  </header>

  <!-- ── Main card ──────────────────────────────────────────────────────────── -->
  <div class="card">

    <!-- Tab nav -->
    <nav class="tabs" role="tablist">
      <button id="tab-enc" class="active" aria-selected="true"  role="tab">Encrypt</button>
      <button id="tab-dec"               aria-selected="false" role="tab">Decrypt</button>
    </nav>

    <!-- ── Encrypt panel ────────────────────────────────────────────────────── -->
    <section id="pane-encrypt" class="panel" role="tabpanel">

      <label for="plain">Secret</label>
      <textarea
        id="plain"
        placeholder="Enter text to encrypt…"
        autocomplete="off"
        spellcheck="false"
      ></textarea>
      <div id="char-counter" class="char-counter">0 chars</div>

      <!-- Password fields — shown only in password mode -->
      <div id="enc-pw-fields"><div class="pw-inner">
        <label for="enc-pass">Password</label>
        <div class="input-action">
          <input id="enc-pass" type="password" placeholder="Password"
                 autocomplete="new-password" autocapitalize="off" spellcheck="false">
          <button type="button" class="toggle-vis" data-target="enc-pass">Show</button>
        </div>
        <div id="pass-strength" class="pass-strength hidden">
          <div class="strength-bar-track">
            <div id="strength-bar" class="strength-bar-fill"></div>
          </div>
          <div id="strength-text" class="strength-text"></div>
          <ul class="strength-checklist" id="strength-checklist">
            <li id="chk-len"    class="fail">✗ 12+ chars</li>
            <li id="chk-upper"  class="fail">✗ Uppercase</li>
            <li id="chk-lower"  class="fail">✗ Lowercase</li>
            <li id="chk-digit"  class="fail">✗ Number</li>
            <li id="chk-symbol" class="fail">✗ Symbol</li>
          </ul>
        </div>
      </div></div>
        <div class="actions">
        <button id="btn-enc" class="primary">Encrypt with passkey</button>
      </div>
      <div id="enc-err" class="error hidden"></div>

      <!-- Encrypt output -->
      <div id="enc-out" class="output hidden">
        <div class="grid">

          <!-- Left: ciphertext -->
          <div>
            <div class="output-header">
              <label for="cipher">Encrypted payload</label>
              <div class="output-header-actions">
                <span id="len-info" class="len-info"></span>
                <button id="copy-enc" class="ghost icon" title="Copy" aria-label="Copy">
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">

<!-- ============================================================
  Application Script
  Sections:
    1. DOM references
    2. Constants & state
    3. Mode toggle
    4. Tab navigation
    5. UI helpers
    6. Crypto utilities
    7. WebAuthn helpers (passkey mode)
    8. PBKDF2 helpers (password mode)
    9. Shared AES-GCM encrypt / decrypt
   10. QR rendering (with title/footer)
   11. Password strength meter
   12. Encrypt flow
   13. Decrypt flow
   14. QR scan / upload
   15. Camera modal
   16. Service worker
============================================================ -->
<script>
(() => {
  'use strict';

  // ── 1. DOM references ─────────────────────────────────────────────────────

  const $ = s => document.querySelector(s);

  // Mode toggle
  const modeToggle = $('#modeToggle');

  // Tabs
  const tabEnc  = $('#tab-enc');
  const tabDec  = $('#tab-dec');
  const paneEnc = $('#pane-encrypt');
  const paneDec = $('#pane-decrypt');

  // Encrypt panel
  const plain       = $('#plain');
  const charCounter = $('#char-counter');
  const encPwFields = $('#enc-pw-fields');
  const encPass     = $('#enc-pass');
  const passStrength= $('#pass-strength');
  const strengthBar = $('#strength-bar');
  const strengthText= $('#strength-text');
  const btnEnc      = $('#btn-enc');
  const encErr      = $('#enc-err');
  const encOut      = $('#enc-out');
  const cipher      = $('#cipher');
  const copyEnc     = $('#copy-enc');
  const lenInfo     = $('#len-info');
  const qrHint      = $('#qr-hint');
  const qrWrap      = $('#qr-wrap');
  const dlQr        = $('#dl-qr');
  const qrTitleInp  = $('#qr-title');
  const qrFooterInp = $('#qr-footer');
  let footerTouched = false;
  let justFocused = false;

  // QR footer: placeholder until focus, then editable default
  qrFooterInp.addEventListener('focus', () => {
    if (!footerTouched) {
      qrFooterInp.value = DEFAULT_FOOTER;
      justFocused = true;
      setTimeout(() => {
        try { qrFooterInp.setSelectionRange(DEFAULT_FOOTER.length, DEFAULT_FOOTER.length); } catch {}
      }, 0);
    }
  });
  qrFooterInp.addEventListener('input', () => {
    footerTouched = true;
    justFocused = false;
  });
  qrFooterInp.addEventListener('blur', () => {
    if (justFocused && !footerTouched && qrFooterInp.value === DEFAULT_FOOTER) {
      qrFooterInp.value = '';
      justFocused = false;
    }
  });

  // Decrypt panel
  const cipherIn  = $('#cipher-in');
  const decPwFields = $('#dec-pw-fields');
  const decPass   = $('#dec-pass');
  const btnDec    = $('#btn-dec');
  const decErr    = $('#dec-err');
  const decOut    = $('#dec-out');
  const plainOut  = $('#plain-out');
  const copyDec   = $('#copy-dec');
  const countdown = $('#countdown');
  const btnUpload = $('#btn-upload');
  const fileQr    = $('#file-qr');
  const btnScan   = $('#btn-scan');

  // Toast & camera modal
  const toast     = $('#toast');
  const camModal  = $('#cam-modal');
  const camVideo  = $('#cam-video');
  const camCanvas = $('#cam-canvas');
  const camClose  = $('#cam-close');

  // ── 2. Constants & state ──────────────────────────────────────────────────

  const QR_MAX_BYTES    = 2953;
  const AUTO_CLEAR_SECS = 60;
  const TOAST_MS        = 1600;
  const PBKDF2_ITERS    = 600000;
  const DEFAULT_FOOTER = "Scan & Decrypt at krindelon.github.io/secret-qr";

  // In-memory mode state — 'key' or 'password'
  let currentMode = 'password';

  const textEnc = new TextEncoder();
  const textDec = new TextDecoder();
  const rand    = n => crypto.getRandomValues(new Uint8Array(n));

  // Fixed user handle — WebAuthn requires a user.id but we have no server and
  // no accounts, so this value is meaningless. A stable constant avoids the
  // risk of localStorage clearing causing a second credential slot to be
  // created on hardware keys.
  const WEBAUTHN_USER_ID = new Uint8Array([0]);

  // Build create options fresh each call so authenticatorAttachment is
  // intentionally absent — this tells
  // the browser to offer ALL authenticators (platform AND cross-platform),
  // which is required for Google Password Manager to appear on Android.
  function buildCreateOptions() {
    return {
      rp:   { id: location.hostname, name: 'Local Vault' },
      user: { id: WEBAUTHN_USER_ID, name: 'owner', displayName: 'Local Vault' },
      // Include both ES256 and RS256 for broadest authenticator compatibility
      pubKeyCredParams: [
        { type: 'public-key', alg: -7  },  // ES256
        { type: 'public-key', alg: -257 }   // RS256
      ],
      authenticatorSelection: {
        residentKey:      'required',
        userVerification: 'required'
        // authenticatorAttachment intentionally omitted:
        //   'platform'       → only phone/laptop built-in (Google PM, Face ID)
        //   'cross-platform' → only hardware keys / other devices
        //   omitted          → browser offers everything, user chooses
      },
      extensions: { prf: { enabled: true } }
    };
  }

  // ── 3. Mode toggle ────────────────────────────────────────────────────────

  function setMode(mode) {
    currentMode = mode;
    const isPw = mode === 'password';

    if (modeToggle) modeToggle.checked = !isPw;

    encPwFields.classList.remove('hidden');
    decPwFields.classList.remove('hidden');
    
    const animateField = (el, show) => {
      const inner = el.querySelector('.pw-inner');
      gsap.killTweensOf(el);
      
      if (show) {
        el.classList.remove('is-collapsed');
        el.style.display = 'grid';
        el.style.pointerEvents = 'auto';
        const targetH = inner.scrollHeight;
        
        gsap.set(el, { height: 0, opacity: 0, y: -8, overflow: 'hidden' });
        gsap.to(el, {
          height: targetH,
          opacity: 1,
          y: 0,
          duration: 0.45,
          ease: 'back.out(1.7)', // GSAP equivalent of Framer overshoot
          onComplete: () => {
            el.style.height = 'auto';
            el.style.overflow = 'visible';
          }
        });
      } else {
        const startH = el.offsetHeight;
        gsap.set(el, { height: startH, overflow: 'hidden' });
        gsap.to(el, {
          height: 0,
          opacity: 0,
          y: -8,
          duration: 0.3,
          ease: 'power2.inOut',
          onComplete: () => {
            el.style.display = 'none';
            el.style.pointerEvents = 'none';
            el.classList.add('is-collapsed');
          }
        });
      }
    };
    
    animateField(encPwFields, isPw);
    animateField(decPwFields, isPw);

    btnEnc.style.opacity = '0';
    btnDec.style.opacity = '0';
    setTimeout(() => {
      btnEnc.textContent = isPw ? 'Encrypt' : 'Encrypt with passkey';
      btnDec.textContent = isPw ? 'Decrypt' : 'Decrypt with passkey';
      btnEnc.style.opacity = '1';
      btnDec.style.opacity = '1';
    }, 120);
    
    encOut.classList.add('hidden');
    decOut.classList.add('hidden');
    hideErr(encErr);
    hideErr(decErr);
  }

  modeToggle.addEventListener('change', () => setMode(modeToggle.checked ? 'key' : 'password'));

  // Initialize in password mode
  setMode('password');

  // ── 4. Tab navigation ─────────────────────────────────────────────────────

  function setTab(which) {
    const isEnc = which === 'encrypt';
    tabEnc.classList.toggle('active', isEnc);
    tabDec.classList.toggle('active', !isEnc);
    paneEnc.classList.toggle('hidden', !isEnc);
    paneDec.classList.toggle('hidden', isEnc);
    tabEnc.setAttribute('aria-selected', String(isEnc));
    tabDec.setAttribute('aria-selected', String(!isEnc));
  }

  tabEnc.addEventListener('click', () => setTab('encrypt'));
  tabDec.addEventListener('click', () => setTab('decrypt'));

  // ── 5. UI helpers ─────────────────────────────────────────────────────────

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), TOAST_MS);
  }

  function showErr(el, msg) {
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function hideErr(el) {
    el.classList.add('hidden');
  }

  function setButtonLoading(btn, label) {
    btn.disabled  = true;
    btn._prevHTML = btn.innerHTML;
    btn.innerHTML = `<span class="spinner"></span> ${label}`;
  }

  function resetButton(btn) {
    btn.disabled  = false;
    btn.innerHTML = btn._prevHTML;
  }

  // Show/hide password toggle buttons
  document.querySelectorAll('.toggle-vis').forEach(btn => {
    btn.addEventListener('click', () => {
      const inp  = document.getElementById(btn.dataset.target);
      const show = inp.type === 'password';
      inp.type       = show ? 'text' : 'password';
      btn.textContent = show ? 'Hide' : 'Show';
    });
  });

  // ── 6. Crypto utilities ───────────────────────────────────────────────────

  /** ArrayBuffer → URL-safe base64 (no padding) */
  function buf2b64u(buf) {
    const bytes = new Uint8Array(buf);
    let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  /** URL-safe base64 → ArrayBuffer */
  function b64u2buf(s) {
    s = s.replace(/-/g, '+').replace(/_/g, '/');
    while (s.length % 4) s += '=';
    const bin = atob(s);
    const out  = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out.buffer;
  }

  // ── 7. WebAuthn helpers (passkey mode) ───────────────────────────────────

  async function createResidentCredential() {
    return navigator.credentials.create({
      publicKey: { challenge: rand(32), ...buildCreateOptions() }
    });
  }

  // Cached PRF salt — derived once, reused every call
  let _prfSalt = null;
  async function getPrfSalt() {
    if (!_prfSalt) {
      _prfSalt = await crypto.subtle.digest('SHA-256', textEnc.encode('static-key'));
    }
    return _prfSalt;
  }

  /**
   * Ask an authenticator for its PRF output.
   * @param {Array|undefined} allowCreds  Pass a non-empty array to target a specific
   *   credential, or omit/pass undefined/[] to show the full authenticator picker
   *   (required for Google Password Manager to appear on Android Chrome).
   */
  async function getPrfKey(allowCreds) {
    const salt = await getPrfSalt();
    const publicKey = {
      challenge:        rand(32),
      rpId:             location.hostname,
      userVerification: 'required',
      extensions:       { prf: { eval: { first: salt } } }
    };
    // Only set allowCredentials when we have a concrete list — passing an empty
    // array suppresses the platform authenticator picker on some browsers.
    if (allowCreds && allowCreds.length > 0) {
      publicKey.allowCredentials = allowCreds;
    }
    const assertion   = await navigator.credentials.get({ publicKey });
    const ext         = assertion.getClientExtensionResults();
    const keyMaterial = ext?.prf?.results?.first;
    if (!keyMaterial) throw new Error('PRF not supported on this key');
    return { keyMaterial, assertion };
  }

  // ── 8. PBKDF2 helpers (password mode) ────────────────────────────────────

  async function deriveKeyFromPassword(password, salt) {
    const norm       = (password || '').normalize('NFKC');
    const baseKey    = await crypto.subtle.importKey(
      'raw', textEnc.encode(norm), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', hash: 'SHA-256', salt, iterations: PBKDF2_ITERS },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['encrypt', 'decrypt']
    );
  }

  // ── 9. Shared AES-GCM encrypt / decrypt ──────────────────────────────────
  //
  // Payload format (both modes):  param.iv.ciphertext  (base64url, 3 parts)
  //   passkey:  param = credentialId  (variable length, ties decrypt to key)
  //   password: param = 16-byte salt  (used for PBKDF2 derivation)
  //
  // Key derivation is the only thing that differs between modes.

  /**
   * Encrypt plaintext.
   * @returns {{ payload: string, credId?: ArrayBuffer }} payload string + optional credId for passkey
   */
  async function doEncrypt(plaintext) {
    const iv = rand(12);
    let key, param, credId;

    if (currentMode === 'key') {
      // Passkey: derive key from PRF output.
      // Strategy:
      //   1. Show the full authenticator picker (no allowCredentials hint) so the
      //      user can pick any stored passkey, including Google Password Manager.
      //   2. If the get() returns NotAllowedError with a message suggesting no
      //      credential exists (or if it succeeds but PRF is absent), create one.
      //   3. Never swallow a user-cancel — re-throw so the UI can report it.
      let keyMaterial, assertion;
      try {
        ({ keyMaterial, assertion } = await getPrfKey());
      } catch (e) {
        // Re-throw user cancellations immediately — do NOT create a new passkey.
        const name = e?.name ?? '';
        const msg  = (e?.message ?? '').toLowerCase();
        const userCancelled =
          name === 'NotAllowedError' &&
          (msg.includes('cancel') || msg.includes('abort') || msg.includes('user'));
        if (userCancelled) throw e;

        // Any other failure (no credential found, first use) → register a new one.
        await createResidentCredential();
        ({ keyMaterial, assertion } = await getPrfKey());
      }
      key    = await crypto.subtle.importKey('raw', keyMaterial, 'AES-GCM', false, ['encrypt']);
      credId = assertion.rawId;
      param  = credId;
    } else {
      // Password: derive key from PBKDF2
      const salt = rand(16);
      key   = await deriveKeyFromPassword(encPass.value, salt);
      param = salt;
    }

    const ct      = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, textEnc.encode(plaintext));
    const payload = [buf2b64u(param), buf2b64u(iv), buf2b64u(ct)].join('.');
    return payload;
  }

  /**
   * Decrypt a payload string.
   * @returns {string} decrypted plaintext
   */
  async function doDecrypt(payload) {
    const parts = payload.trim().split('.');
    if (parts.length !== 3) throw new Error('Invalid payload — expected 3 dot-separated parts');

    const B64U = /^[A-Za-z0-9_-]+$/;
    if (!parts.every(p => p.length > 0 && B64U.test(p))) {
      throw new Error('Invalid payload — contains unexpected characters');
    }

    let paramBuf, iv, ct;
    try {
      paramBuf = b64u2buf(parts[0]);
      iv       = new Uint8Array(b64u2buf(parts[1]));
      ct       = b64u2buf(parts[2]);
    } catch {
      throw new Error('Invalid payload — could not decode');
    }

    let key;

    if (currentMode === 'key') {
      // paramBuf is the credential ID stored at encrypt time.
      // Try targeting that specific credential first (faster, no picker needed).
      // If that fails (e.g. synced passkey has a different local ID), fall back
      // to the open picker — again with no allowCredentials so Google PM appears.
      const credId = paramBuf;
      let keyMaterial;
      try {
        ({ keyMaterial } = await getPrfKey([{ type: 'public-key', id: credId }]));
      } catch (e) {
        // Re-throw user cancellations — do NOT open a second picker.
        const name = e?.name ?? '';
        const msg  = (e?.message ?? '').toLowerCase();
        const userCancelled =
          name === 'NotAllowedError' &&
          (msg.includes('cancel') || msg.includes('abort') || msg.includes('user'));
        if (userCancelled) throw e;
        // Fallback: open picker — handles synced passkeys with a different local ID
        ({ keyMaterial } = await getPrfKey());
      }
      key = await crypto.subtle.importKey('raw', keyMaterial, 'AES-GCM', false, ['decrypt']);
    } else {
      // paramBuf is the 16-byte PBKDF2 salt
      const pass = decPass.value;
      if (!pass) throw new Error('Enter the password');
      key = await deriveKeyFromPassword(pass, new Uint8Array(paramBuf));
    }

    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    return textDec.decode(pt);
  }

  // ── 10. QR rendering (with title / footer) ────────────────────────────────

  /**
   * Render the QR for `text` into #qr-wrap.
   * Title (top) adds 28px; footer (bottom) adds 22px.
   * If both empty, canvas is exactly 280×280.
   */
  // QR state — kept in closure, not on window
  let _lastQR = null;

  function renderQR(text) {
    qrWrap.innerHTML = '';
    const level   = $('#qr-level').value || 'M';
    const title   = (qrTitleInp.value  || '').trim();
    const footer  = footerTouched ? (qrFooterInp.value || '').trim() : DEFAULT_FOOTER;

    // Store for download
    _lastQR = { text, level, title, footer };

    // Preview container
    const previewBox = document.createElement('div');
    previewBox.style.display = 'flex';
    previewBox.style.flexDirection = 'column';
    previewBox.style.alignItems = 'center';
    previewBox.style.gap = '6px';

    if (title) {
      const t = document.createElement('div');
      t.textContent = title;
      t.style.font = '600 13px system-ui, -apple-system, sans-serif';
      t.style.color = '#1f2328';
      t.style.textAlign = 'center';
      t.style.maxWidth = '280px';
      t.style.overflow = 'hidden';
      t.style.textOverflow = 'ellipsis';
      t.style.whiteSpace = 'nowrap';
      previewBox.appendChild(t);
    }

    const qrContainer = document.createElement('div');
    qrContainer.style.width = '280px';
    qrContainer.style.height = '280px';
    previewBox.appendChild(qrContainer);

    const f = document.createElement('div');
    f.textContent = footer;
    f.style.font = '400 11px system-ui, -apple-system, sans-serif';
    f.style.color = '#1f2328';
    f.style.textAlign = 'center';
    f.style.maxWidth = '280px';
    f.style.overflow = 'hidden';
    f.style.textOverflow = 'ellipsis';
    f.style.whiteSpace = 'nowrap';
    previewBox.appendChild(f);

    qrWrap.appendChild(previewBox);

    // Create QR using qr-code-styling
    const qrCode = new QRCodeStyling({
      width: 280,
      height: 280,
      type: 'canvas',
      data: text,
      margin: 10,
      qrOptions: { errorCorrectionLevel: level },
      dotsOptions: { color: '#000000', type: 'square' },
      backgroundOptions: { color: '#ffffff' }
    });

    qrCode.append(qrContainer);
  }


  // Re-render QR when title/footer/level changes (if a payload already exists)
  function reRenderIfPayload() {
    if (cipher.value) {
      try { renderQR(cipher.value); } catch { /* ignore */ }
    }
  }
  qrTitleInp.addEventListener('input',  reRenderIfPayload);
  qrFooterInp.addEventListener('input', reRenderIfPayload);
  $('#qr-level').addEventListener('change', reRenderIfPayload);

  // ── 11. Password strength meter ───────────────────────────────────────────

  const chkLen    = $('#chk-len');
  const chkUpper  = $('#chk-upper');
  const chkLower  = $('#chk-lower');
  const chkDigit  = $('#chk-digit');
  const chkSymbol = $('#chk-symbol');

  function setCheck(el, passes) {
    el.textContent = (passes ? '✓ ' : '✗ ') + el.textContent.slice(2);
    el.classList.toggle('pass', passes);
    el.classList.toggle('fail', !passes);
  }

  encPass.addEventListener('input', () => {
    const p = encPass.value;
    if (!p) {
      passStrength.classList.add('hidden');
      return;
    }
    passStrength.classList.remove('hidden');

    const hasLen    = p.length >= 12;
    const hasUpper  = /[A-Z]/.test(p);
    const hasLower  = /[a-z]/.test(p);
    const hasDigit  = /\d/.test(p);
    const hasSymbol = /[^A-Za-z0-9]/.test(p);

    setCheck(chkLen,    hasLen);
    setCheck(chkUpper,  hasUpper);
    setCheck(chkLower,  hasLower);
    setCheck(chkDigit,  hasDigit);
    setCheck(chkSymbol, hasSymbol);

    let score = 0;
    if (p.length >= 8)  score++;
    if (hasLen)         score++;
    if (hasUpper && hasLower) score++;
    if (hasDigit)       score++;
    if (hasSymbol)      score++;

    const levels = [
      { w: '20%', c: '#ef4444', t: 'Very weak'  },
      { w: '40%', c: '#f97316', t: 'Weak'        },
      { w: '60%', c: '#eab308', t: 'Fair'        },
      { w: '80%', c: '#22c55e', t: 'Good'        },
      { w: '100%',c: '#10b981', t: 'Strong'      }
    ];
    const level = levels[Math.min(score, 4)];
    strengthBar.style.width      = level.w;
    strengthBar.style.background = level.c;
    strengthText.textContent     = level.t + (score < 3 ? ' — use 12+ chars with mix' : '');
  });

  // ── 12. Encrypt flow ──────────────────────────────────────────────────────

  plain.addEventListener('input', () => {
    charCounter.textContent = plain.value.length + ' chars';
  });

  btnEnc.addEventListener('click', async () => {
    hideErr(encErr);
    const text = plain.value;
    if (!text) return showErr(encErr, 'Enter text to encrypt');

    if (currentMode === 'password') {
      if (!encPass.value) return showErr(encErr, 'Enter a password');
    }

    const loadingLabel = currentMode === 'key' ? 'Touch key…' : 'Deriving key…';
    setButtonLoading(btnEnc, loadingLabel);

    try {
      const payload = await doEncrypt(text);

      cipher.value = payload;
      encOut.classList.remove('hidden');

      const len = payload.length;
      lenInfo.textContent = len + ' chars';
      lenInfo.style.color = len > QR_MAX_BYTES ? 'var(--danger)' : 'var(--muted)';
      qrHint.textContent  = len > QR_MAX_BYTES ? 'Too long for QR' : 'Scan to transfer';

      try { renderQR(payload); } catch (e) { console.error('QR render failed:', e); }

      showToast('Encrypted');

      plain.value             = '';
      charCounter.textContent = '0 chars';
      if (currentMode === 'password') {
        encPass.value = '';
        passStrength.classList.add('hidden');
      }

    } catch (e) {
      console.error('Encryption error:', e);
      showErr(encErr, e.message || 'Encryption failed');
    } finally {
      resetButton(btnEnc);
    }
  });

  copyEnc.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(cipher.value);
      showToast('Copied');
    } catch {
      showToast('Copy failed');
    }
  });

  dlQr.addEventListener('click', async () => {
    if (!_lastQR) return;
    const { text, level, title, footer } = _lastQR;
    
    // Show loading
    const originalHTML = dlQr.innerHTML;
    dlQr.disabled = true;
    dlQr.innerHTML = '...';
    
    try {
      // Generate high-res QR (1200px for 4" print)
      const qrHighRes = new QRCodeStyling({
        width: 1200,
        height: 1200,
        type: 'canvas',
        data: text,
        margin: 40,
        qrOptions: { errorCorrectionLevel: level },
        dotsOptions: { color: '#000000', type: 'square' },
        backgroundOptions: { color: '#ffffff' }
      });
      
      const qrBlob = await qrHighRes.getRawData('png');
      const qrImg = await createImageBitmap(qrBlob);
      
      // 5x7" card at 300 DPI: 1500 x 2100
      const W = 1500, H = 2100;
      const canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      
      // White background
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);
      
      // Title
      let qrY = 190;
      if (title) {
        ctx.fillStyle = '#000000';
        ctx.font = 'bold 72px Helvetica, Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(title, W/2, 190, W - 200);
        qrY = 280;
      }
      
      // QR centered
      const qrSize = 1200;
      const qrX = Math.round((W - qrSize) / 2);
      ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);
      
      // Footer
      ctx.fillStyle = '#000000';
      ctx.font = '56px Helvetica, Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      const footerY = qrY + qrSize + 80;
      ctx.fillText(footer, W/2, footerY, W - 200);
      
      // Timestamp (download only)
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const tsDisplay = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      ctx.fillStyle = '#888888';
      ctx.font = '32px Helvetica, Arial, sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'bottom';
      ctx.fillText(tsDisplay, W - 60, H - 50);
      
      // Download with timestamp in filename
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const tsFile = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
        a.href = url;
        a.download = `secret-qr-${tsFile}.png`;
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
      
    } catch (e) {
      console.error(e);
      showToast('Download failed');
    } finally {
      dlQr.disabled = false;
      dlQr.innerHTML = originalHTML;
    }
  });


  // ── 13. Decrypt flow ──────────────────────────────────────────────────────

  let clearTimer = null;

  function startCountdown() {
    clearInterval(clearTimer);
    let secs = AUTO_CLEAR_SECS;
    countdown.textContent = `Clears in ${secs}s`;
    clearTimer = setInterval(() => {
      secs--;
      countdown.textContent = `Clears in ${secs}s`;
      if (secs <= 0) {
        clearInterval(clearTimer);
        clearDecryptedOutput();
        showToast('Cleared');
      }
    }, 1000);
  }

  function clearDecryptedOutput() {
    clearInterval(clearTimer);
    countdown.textContent = '';
    plainOut.value = '';
    decOut.classList.add('hidden');
  }

  btnDec.addEventListener('click', async () => {
    hideErr(decErr);
    const payload = cipherIn.value.trim();
    if (!payload) return showErr(decErr, 'Paste an encrypted payload');

    if (currentMode === 'password' && !decPass.value) {
      return showErr(decErr, 'Enter the password');
    }

    const loadingLabel = currentMode === 'key' ? 'Touch key…' : 'Decrypting…';
    setButtonLoading(btnDec, loadingLabel);

    try {
      const text = await doDecrypt(payload);

      plainOut.value = text;
      decOut.classList.remove('hidden');
      showToast('Decrypted');
      startCountdown();

      if (currentMode === 'password') {
        decPass.value = '';
      }

    } catch (e) {
      console.error('Decryption error:', e);
      showErr(decErr, e.message || 'Decryption failed — wrong key or corrupted data');
    } finally {
      resetButton(btnDec);
    }
  });

  copyDec.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(plainOut.value);
      showToast('Copied');
      clearDecryptedOutput();
    } catch {
      showToast('Copy failed — text preserved');
    }
  });

  // ── 14. QR scan / upload ──────────────────────────────────────────────────

  btnUpload.addEventListener('click', () => fileQr.click());

  fileQr.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      const bmp  = await createImageBitmap(file);
      const text = await decodeQRFromBitmap(bmp);
      if (text) {
        cipherIn.value = text;
        showToast('QR loaded');
        setTab('decrypt');
      } else {
        showErr(decErr, 'No QR code found in image');
      }
    } catch {
      showErr(decErr, 'Could not read image file');
    } finally {
      fileQr.value = '';
    }
  });

  async function decodeQRFromBitmap(bitmap) {
    if (barcodeDetector) {
      try {
        const codes = await barcodeDetector.detect(bitmap);
        if (codes.length) return codes[0].rawValue;
      } catch { /* fall through */ }
    }
    if (typeof window.jsQR === 'function') {
      try {
        const canvas = document.createElement('canvas');
        canvas.width  = bitmap.width;
        canvas.height = bitmap.height;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        ctx.drawImage(bitmap, 0, 0);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const res = window.jsQR(img.data, img.width, img.height);
        if (res && res.data) return res.data;
      } catch { /* ignore */ }
    }
    return null;
  }

  // ── 15. Camera modal ──────────────────────────────────────────────────────

  let scanRaf = null;
  let stream  = null;
  // Instantiated once — creating it inside the loop would allocate on every frame
  const barcodeDetector = ('BarcodeDetector' in window)
    ? new BarcodeDetector({ formats: ['qr_code'] })
    : null;

  btnScan.addEventListener('click', async () => {
    hideErr(decErr);
    if (!navigator.mediaDevices) return showErr(decErr, 'Camera not supported in this browser');

    camModal.classList.remove('hidden');
    camModal.setAttribute('aria-hidden', 'false');

    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
      camVideo.srcObject = stream;
      await camVideo.play();
      scanLoop();
    } catch {
      closeCam();
      showErr(decErr, 'Camera access denied');
    }
  });

  camClose.addEventListener('click', closeCam);

  function closeCam() {
    camModal.classList.add('hidden');
    camModal.setAttribute('aria-hidden', 'true');
    if (scanRaf) { cancelAnimationFrame(scanRaf); scanRaf = null; }
    if (stream)  { stream.getTracks().forEach(t => t.stop()); stream = null; }
    camVideo.srcObject = null;
  }

  async function scanLoop() {
    if (camVideo.readyState < 2) { scanRaf = requestAnimationFrame(scanLoop); return; }
    const w = camVideo.videoWidth;
    const h = camVideo.videoHeight;
    if (!w || !h) { scanRaf = requestAnimationFrame(scanLoop); return; }

    camCanvas.width  = w;
    camCanvas.height = h;
    const ctx = camCanvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(camVideo, 0, 0, w, h);

    let found = null;

    if (barcodeDetector) {
      try {
        const codes = await barcodeDetector.detect(camCanvas);
        if (codes.length) found = codes[0].rawValue;
      } catch { /* ignore */ }
    }

    if (!found && typeof window.jsQR === 'function') {
      try {
        const img = ctx.getImageData(0, 0, w, h);
        const res = window.jsQR(img.data, w, h);
        if (res && res.data) found = res.data;
      } catch { /* ignore */ }
    }

    if (found) {
      cipherIn.value = found;
      showToast('QR scanned');
      closeCam();
      setTab('decrypt');
      return;
    }

    scanRaf = requestAnimationFrame(scanLoop);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !camModal.classList.contains('hidden')) closeCam();
  });

  // ── 16. Service worker ────────────────────────────────────────────────────

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(console.error);
    });
  }

})();
</script>
</body>
</html>
